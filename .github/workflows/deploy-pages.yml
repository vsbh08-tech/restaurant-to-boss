name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
      - feature/review-prepayments-bar-analytics-20260316
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_APP_BASE_PATH: /restaurant-hub/
      VITE_ROUTER_MODE: hash
      VITE_SUPABASE_URL: https://gajsyhkasysyynpbqsuq.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_dxtEQKNTY6xoWTBqfw0BXg_3JCEfcRD
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
